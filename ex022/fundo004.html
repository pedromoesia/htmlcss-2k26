<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento vertical</title>
</head>
<body>
    <style>
        #container {
            position: relative;
            height: 95vh;
            padding: 10px;
            background-image: linear-gradient(to bottom, red, rgb(0, 0, 0));
            
        
    }

    #conteudo
    {
        position: absolute;
        width: 300px;
        height: 200px;
        background-color: rgb(0, 0, 0);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    </style>
    
</body>
<section id="container">
    <article id="conteudo">

    </article>
</section>
</html>
